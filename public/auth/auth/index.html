<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>LinkedIn Auth — Trabalhei Lá</title>

    <script>
      (function () {
        const RESULT_KEY = "linkedin_oauth_result";
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");
        const state = params.get("state");
        const error = params.get("error");
        const errorDescription = params.get("error_description");

        const APP_ORIGIN = window.location.origin;
        const APP_URL = APP_ORIGIN;

        const persistResult = (payload) => {
          try {
            localStorage.setItem(
              RESULT_KEY,
              JSON.stringify({
                ...payload,
                createdAt: Date.now(),
              })
            );
          } catch (err) {
            console.warn("Falha ao persistir retorno do LinkedIn no storage:", err);
          }
        };

        const hasOpener =
          window.opener &&
          window.opener !== window &&
          typeof window.opener.postMessage === "function";

        if (code) {
          const payload = {
            type: "linkedin_oauth",
            code,
            state,
          };

          persistResult(payload);

          if (hasOpener) {
            try {
              window.opener.postMessage(payload, APP_ORIGIN);
              window.close();
              return;
            } catch (err) {
              console.warn("Falha ao notificar opener do LinkedIn:", err);
            }
          }

          const qs = new URLSearchParams({ linkedin_code: code });
          if (state) qs.set("state", state);
          window.location.replace(`${APP_URL}/?${qs.toString()}`);
          return;
        }

        if (error) {
          const payload = {
            type: "linkedin_oauth_error",
            message: errorDescription || error,
          };

          persistResult(payload);

          if (hasOpener) {
            try {
              window.opener.postMessage(payload, APP_ORIGIN);
              window.close();
              return;
            } catch (err) {
              console.warn("Falha ao notificar erro ao opener do LinkedIn:", err);
            }
          }

          const qs = new URLSearchParams({
            linkedin_error: error,
            linkedin_error_description: errorDescription || "",
          });
          window.location.replace(`${APP_URL}/?${qs.toString()}`);
          return;
        }

        window.location.replace(APP_URL);
      })();
    </script>
  </head>

  <body
    style="
      font-family: Inter, Arial, sans-serif;
      text-align: center;
      padding: 48px;
      background: #0b1220;
      color: #fff;
    "
  >
    <h2 style="margin: 0 0 12px; font-weight: 800">Conectando com o LinkedIn…</h2>
    <p style="margin: 0; opacity: 0.85">Você será redirecionado automaticamente.</p>
  </body>
</html>
