<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>LinkedIn Auth — Trabalhei Lá</title>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");
        const state = params.get("state");
        const error = params.get("error");
        const errorDescription = params.get("error_description");

        const APP_URL = "https://www.trabalheila.com.br";
        const APP_ORIGIN = new URL(APP_URL).origin;

        const hasOpener =
          window.opener &&
          window.opener !== window &&
          typeof window.opener.postMessage === "function";

        if (code) {
          if (hasOpener) {
            try {
              window.opener.postMessage(
                {
                  type: "linkedin_oauth",
                  code,
                  state,
                },
                APP_ORIGIN
              );
              window.close();
              return;
            } catch (err) {
              console.warn("Falha ao notificar opener do LinkedIn:", err);
            }
          }

          const qs = new URLSearchParams({ code });
          if (state) qs.set("state", state);
          window.location.replace(`${APP_URL}/auth/linkedin?${qs.toString()}`);
          return;
        }

        if (error) {
          if (hasOpener) {
            try {
              window.opener.postMessage(
                {
                  type: "linkedin_oauth_error",
                  message: errorDescription || error,
                },
                APP_ORIGIN
              );
              window.close();
              return;
            } catch (err) {
              console.warn("Falha ao notificar erro ao opener do LinkedIn:", err);
            }
          }

          const qs = new URLSearchParams({
            error,
            error_description: errorDescription || "",
          });
          window.location.replace(`${APP_URL}/auth/linkedin?${qs.toString()}`);
          return;
        }

        window.location.replace(APP_URL);
      })();
    </script>
  </head>

  <body
    style="
      font-family: Inter, Arial, sans-serif;
      text-align: center;
      padding: 48px;
      background: #0b1220;
      color: #fff;
    "
  >
    <h2 style="margin: 0 0 12px; font-weight: 800">Conectando com o LinkedIn…</h2>
    <p style="margin: 0; opacity: 0.85">Você será redirecionado automaticamente.</p>
  </body>
</html>
